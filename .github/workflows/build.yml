name: Build BASAMAK

# Builds installable plugins for macOS, Windows and Linux on every push and
# uploads them as downloadable artifacts. When you PUBLISH a GitHub Release,
# it also builds all three OSes and attaches their zips to that Release.
on:
  push:
  workflow_dispatch:
  release:
    types: [published]   # publishing a Release auto-builds + attaches all 3 OS zips

env:
  JUCE_TAG: 8.0.13

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   name: macOS }
          - { os: windows-latest, name: Windows }
          - { os: ubuntu-latest,  name: Linux }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
            libfreetype6-dev libfontconfig1-dev libgl1-mesa-dev libx11-dev \
            libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libcurl4-openssl-dev libwebkit2gtk-4.1-dev ninja-build

      - name: Get JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: ${{ env.JUCE_TAG }}
          path: JUCE

      - name: Configure
        run: cmake -B build -DDAVULSEQ_RELEASE=ON -DJUCE_DIR="${{ github.workspace }}/JUCE" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage package (macOS / Linux)
        if: matrix.name != 'Windows'
        shell: bash
        run: |
          VER=$(grep -m1 'project(BASAMAK VERSION' CMakeLists.txt | sed -E 's/.*VERSION ([0-9.]+).*/\1/')
          OUT="BASAMAK-$VER-${{ matrix.name }}"   # version in the FILE name (was BASAMAK-<os>.zip = confusing across versions)
          mkdir -p "$OUT"
          find build -name "BASAMAK.vst3"      -maxdepth 8 -exec cp -R {} "$OUT/" \;
          find build -name "BASAMAK.component" -maxdepth 8 -exec cp -R {} "$OUT/" \;   # AU (macOS)
          find build -name "BASAMAK.app"       -maxdepth 8 -exec cp -R {} "$OUT/" \;   # Standalone (macOS)
          find build -path "*Standalone/BASAMAK" -type f -maxdepth 8 -exec cp {} "$OUT/" \;   # Standalone (Linux)
          # [2026-07-15 21:30] HARD-VERIFY the plugin actually staged (the Windows leg shipped an
          # empty bundle once - never trust a copy silently again).
          if [ "${{ matrix.name }}" = "macOS" ] && [ ! -d "$OUT/BASAMAK.vst3/Contents" ]; then
            echo "STAGING FAILED: BASAMAK.vst3 missing/empty"; exit 1
          fi
          if [ "${{ matrix.name }}" = "Linux" ] && [ ! -e "$OUT/BASAMAK.vst3/Contents/x86_64-linux/BASAMAK.so" ]; then
            echo "STAGING FAILED: BASAMAK.vst3 missing/empty"; exit 1
          fi
          cp -R Resources/Samples "$OUT/Samples"                                        # bundled CC0 sample library
          cp -R Resources/TouchOSC "$OUT/TouchOSC"                                       # TouchOSC control-surface template
          cp -R "Resources/launchpad+launchkey custom midi modes" "$OUT/launchpad+launchkey custom midi modes"   # Novation custom modes (.syx) pairing with the factory MIDI map
          echo "$VER" > "$OUT/VERSION"
          cp Distribution/INSTALL.txt "$OUT/" 2>/dev/null || true
          if [ "${{ matrix.name }}" = "macOS" ]; then
            cp Distribution/scripts/install-macos.command "$OUT/Install BASAMAK.command"; chmod +x "$OUT/Install BASAMAK.command"
          else
            cp Distribution/scripts/install-linux.sh "$OUT/"; chmod +x "$OUT/install-linux.sh"
          fi
          # Zip on the native runner so executable bits + the .app's symlinks survive
          # (this is what the manual artifact-download method loses on macOS).
          zip -r -y "$OUT.zip" "$OUT"

      - name: Stage package (Windows)
        if: matrix.name == 'Windows'
        shell: pwsh
        run: |
          $ver = (Select-String -Path CMakeLists.txt -Pattern 'project\(BASAMAK VERSION ([0-9.]+)').Matches[0].Groups[1].Value
          $out = "BASAMAK-$ver-Windows"
          New-Item -ItemType Directory -Force $out | Out-Null
          # [2026-07-15 21:30] the app ICON made JUCE mark the VST3 bundle's contents HIDDEN/SYSTEM
          # (folder-icon decoration) - PowerShell's Copy-Item/Compress-Archive silently SKIP such
          # files, which shipped a v1.4.5 zip whose BASAMAK.vst3 held only desktop.ini (user-caught).
          # Strip the attributes first, copy from the KNOWN artefact path, and HARD-VERIFY the
          # plugin binary is actually staged - a green run must never again mean an empty zip.
          $vst3src = "build/BASAMAK_artefacts/Release/VST3/BASAMAK.vst3"
          if (!(Test-Path $vst3src)) { throw "VST3 bundle not found at $vst3src" }
          attrib -S -H "$vst3src" /S /D
          Copy-Item $vst3src "$out\BASAMAK.vst3" -Recurse -Force
          if (!(Test-Path "$out\BASAMAK.vst3\Contents\x86_64-win\BASAMAK.vst3")) {
            throw "STAGING FAILED: the plugin binary is missing from the staged BASAMAK.vst3"
          }
          $exe = Get-ChildItem -Recurse -File build -Filter BASAMAK.exe | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "$out\BASAMAK.exe" }   # Standalone (Windows)
          Copy-Item Resources/Samples "$out\Samples" -Recurse        # bundled CC0 sample library
          Copy-Item Resources/TouchOSC "$out\TouchOSC" -Recurse      # TouchOSC control-surface template
          Copy-Item "Resources/launchpad+launchkey custom midi modes" "$out\launchpad+launchkey custom midi modes" -Recurse   # Novation custom modes (.syx) pairing with the factory MIDI map
          Copy-Item Distribution/scripts/install-windows.bat "$out\"
          Copy-Item Distribution/INSTALL.txt "$out\" -ErrorAction SilentlyContinue
          Compress-Archive -Path $out -DestinationPath "$out.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BASAMAK-${{ matrix.name }}
          path: BASAMAK-*-${{ matrix.name }}.zip

  # When you publish a GitHub Release, this builds all three OSes and attaches
  # the platform zips to that Release automatically (no manual download/upload).
  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write          # lets the action upload assets to the Release
    steps:
      - name: Download the built zips
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Attach zips to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
